
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Image Slideshow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        #slideshowImage { transition: opacity 9.5s ease-in-out; }
        .hidden { display: none; }
        :root {
            --overlay-bg: rgba(0, 0, 0, 0.85);
            --overlay-text: #ffffff;
            --overlay-font-size: 0.70rem;
            --overlay-z-index: 99999;
            --overlay-padding: 6px 20px;
        }
        .bottom-contact-overlay {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 32px;
            background-color: var(--overlay-bg); color: var(--overlay-text);
            font-size: var(--overlay-font-size); font-family: Arial, sans-serif;
            z-index: var(--overlay-z-index); display: flex;
            justify-content: space-between; align-items: center;
            padding: var(--overlay-padding); box-sizing: border-box; pointer-events: none; 
        }
        .bottom-contact-overlay .overlay-left, .bottom-contact-overlay .overlay-right { pointer-events: auto; }
        .bottom-contact-overlay a { color: var(--overlay-text); text-decoration: none; letter-spacing: 0.5px; }
        .bottom-contact-overlay a:hover { text-decoration: underline; }
    </style>
</head>
<body class="bg-gray-900 text-white">

<div class="bottom-contact-overlay">
  <div class="overlay-left"><a href="mailto:MrBrodsky@JimAndI.Art">MrBrodsky@JimAndI.Art</a></div>
  <div class="overlay-right">
    <a href="http://www.tghc.pro" target="_blank" rel="noopener noreferrer">Jim And I Art &emsp; Tardigradia Holding Company &emsp; www.tghc.pro</a>
  </div>
</div>

<nav class="fixed top-0 left-0 right-0 h-12 bg-gray-800 shadow-md flex items-center justify-between px-4 z-50">
    <div class="flex items-center space-x-3">
        <button id="gButton" class="bg-gray-700 hover:bg-gray-600 text-white font-bold w-8 h-8 rounded-full flex items-center justify-center">J</button>
        <button id="pausePlayButton" class="hidden bg-gray-700 hover:bg-gray-600 text-white font-bold w-8 h-8 rounded-full flex items-center justify-center text-xs" title="Play/Pause">⏸</button>
        <button id="nextButton" class="hidden bg-gray-700 hover:bg-gray-600 text-white font-bold w-8 h-8 rounded-full flex items-center justify-center text-xs" title="Next Picture">⏭</button>
        <button id="speedDownButton" class="hidden bg-gray-700 hover:bg-gray-600 text-white font-bold w-8 h-8 rounded-full flex items-center justify-center text-xs" title="Decrease Speed">➖</button>
        <button id="speedUpButton" class="hidden bg-gray-700 hover:bg-gray-600 text-white font-bold w-8 h-8 rounded-full flex items-center justify-center text-xs" title="Increase Speed">➕</button>
        <button id="fullscreenButton" class="bg-gray-700 hover:bg-gray-600 text-white font-bold w-8 h-8 rounded-full flex items-center justify-center text-xs" title="Toggle Fullscreen">⛶</button>
        <span id="repoInfo" class="text-sm text-gray-300 font-mono whitespace-nowrap overflow-hidden overflow-ellipsis max-w-[calc(100vw-140px)]">Owner-Repo-Path</span>
    </div>
</nav>

<div id="dropdownMenu" class="hidden fixed top-12 left-0 right-0 bg-gray-800 shadow-lg z-40 p-4 border-t border-gray-700 max-h-[calc(100vh-3rem)] overflow-y-auto">
    <div class="max-w-4xl mx-auto">
        <form id="repoForm" class="space-y-3">
            <div>
                <label for="owner" class="block text-xs font-medium text-gray-400">Owner</label>
                <input type="text" id="owner" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-sm" required>
            </div>
            <div>
                <label for="repo" class="block text-xs font-medium text-gray-400">Repo</label>
                <input type="text" id="repo" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-sm" required>
            </div>
            <div>
                <label for="path" class="block text-xs font-medium text-gray-400">Path</label>
                <input type="text" id="path" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-sm">
            </div>
            <button type="submit" id="submitButton" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition duration-200">Analyze Directory</button>
        </form>
        <div id="messageArea" class="mt-4 text-center text-sm"></div>
        <div id="resultsContainer" class="mt-4 hidden">
            <h3 class="text-lg font-semibold mb-2">Directory Contents</h3>
            <div class="overflow-x-auto bg-gray-900 rounded-md max-h-64 overflow-y-auto border border-gray-700">
                <table id="resultsTable" class="min-w-full divide-y divide-gray-700">
                    <thead class="bg-gray-700">
                        <tr>
                            <th class="px-2 py-1 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Name</th>
                            <th class="px-2 py-1 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Type</th>
                            <th class="px-2 py-1 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">Size</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody" class="bg-gray-800 divide-y divide-gray-700"></tbody>
                </table>
            </div>
        </div>
        <div id="readmeContainer" class="mt-6 hidden bg-gray-900 rounded-md p-4 text-sm text-gray-300 overflow-y-auto max-h-64 border border-gray-700 shadow-inner">
            <h3 class="text-lg font-semibold mb-2 text-white border-b border-gray-700 pb-2 flex items-center"><span class="mr-2">📄</span> README.md</h3>
            <pre id="readmeContent" class="whitespace-pre-wrap font-mono text-xs"></pre>
        </div>
    </div>
</div>

<main id="slideshowContainer" class="fixed top-12 left-0 right-0 bottom-8 bg-black flex items-center justify-center">
    <div id="slideshowMessage" class="text-xl text-gray-400">Loading...</div>
    <img id="slideshowImage" src="" alt="Slideshow Image" class="object-contain w-full h-full opacity-0">
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const gButton = document.getElementById('gButton'), pausePlayButton = document.getElementById('pausePlayButton'), nextButton = document.getElementById('nextButton');
        const speedDownButton = document.getElementById('speedDownButton'), speedUpButton = document.getElementById('speedUpButton'), fullscreenButton = document.getElementById('fullscreenButton');
        const dropdownMenu = document.getElementById('dropdownMenu'), repoForm = document.getElementById('repoForm'), ownerInput = document.getElementById('owner');
        const repoInput = document.getElementById('repo'), pathInput = document.getElementById('path'), submitButton = document.getElementById('submitButton');
        const repoInfo = document.getElementById('repoInfo'), messageArea = document.getElementById('messageArea'), resultsContainer = document.getElementById('resultsContainer');
        const resultsBody = document.getElementById('resultsBody'), readmeContainer = document.getElementById('readmeContainer'), readmeContent = document.getElementById('readmeContent');
        const slideshowContainer = document.getElementById('slideshowContainer'), slideshowImage = document.getElementById('slideshowImage'), slideshowMessage = document.getElementById('slideshowMessage');

        let currentSlideshowImages = [], shuffledIndices = [], currentSlideIndex = 0, slideshowTimer = null, isPaused = false, slideshowDelay = 40000;
        const defaultOwner = "jimandiart", defaultRepo = "Art", defaultPath = "Pix", defaultOpeningImage = "jimandi_logo.png"; 
        const imageExtensions = ['.png', '.jpg', '.jpeg', '.gif', '.webp', '.bmp', '.svg'];

        function init() {
            gButton.addEventListener('click', toggleDropdown);
            pausePlayButton.addEventListener('click', togglePause);
            nextButton.addEventListener('click', skipToNextSlide);
            speedDownButton.addEventListener('click', decreaseSpeed);
            speedUpButton.addEventListener('click', increaseSpeed);
            fullscreenButton.addEventListener('click', toggleFullscreen);
            repoForm.addEventListener('submit', handleFormSubmit);

            ownerInput.value = defaultOwner; repoInput.value = defaultRepo; pathInput.value = defaultPath;
            updateRepoInfo(defaultOwner, defaultRepo, defaultPath);
            analyzeDirectory(defaultOwner, defaultRepo, defaultPath);
        }

        function toggleDropdown() { dropdownMenu.classList.toggle('hidden'); }

        function togglePause() {
            isPaused = !isPaused;
            pausePlayButton.textContent = isPaused ? '▶' : '⏸';
            if (isPaused) { if (slideshowTimer) { clearTimeout(slideshowTimer); slideshowTimer = null; } }
            else { slideshowTimer = setTimeout(() => { slideshowImage.classList.add('opacity-0'); setTimeout(showNextSlide, 200); }, slideshowDelay); }
        }
        
        function skipToNextSlide() {
            if (slideshowTimer) { clearTimeout(slideshowTimer); slideshowTimer = null; }
            slideshowImage.classList.add('opacity-0'); setTimeout(showNextSlide, 200);
        }

        function increaseSpeed() { slideshowDelay = Math.max(10000, slideshowDelay - 5000); restartTimerIfRunning(); }
        function decreaseSpeed() { slideshowDelay += 5000; restartTimerIfRunning(); }

        function restartTimerIfRunning() {
            if (slideshowTimer && !isPaused) {
                clearTimeout(slideshowTimer);
                slideshowTimer = setTimeout(() => { slideshowImage.classList.add('opacity-0'); setTimeout(showNextSlide, 200); }, slideshowDelay);
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(err => { console.warn(`Error: ${err.message}`); }); }
            else { if (document.exitFullscreen) { document.exitFullscreen(); } }
        }

        function updateRepoInfo(owner, repo, path) {
            const displayPath = path ? `-${path.split('/').filter(Boolean).pop()}` : '';
            repoInfo.textContent = `${owner}-${repo}${displayPath}`;
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const owner = ownerInput.value.trim(), repo = repoInput.value.trim(), path = pathInput.value.trim();
            if (!owner || !repo) { showMessage('Owner and Repo are required.', 'error'); return; }
            updateRepoInfo(owner, repo, path); analyzeDirectory(owner, repo, path); toggleDropdown(); 
        }

        function navigateToPath(newPath) {
            pathInput.value = newPath; const owner = ownerInput.value.trim(), repo = repoInput.value.trim();
            updateRepoInfo(owner, repo, newPath); analyzeDirectory(owner, repo, newPath);
        }

        function navigateUp() {
            let currentPath = pathInput.value.trim(); if (!currentPath) return;
            let parts = currentPath.split('/').filter(Boolean); parts.pop();
            navigateToPath(parts.join('/'));
        }

        async function analyzeDirectory(owner, repo, path) {
            setLoading(true); stopSlideshow(); resultsBody.innerHTML = ''; resultsContainer.classList.add('hidden');
            readmeContainer.classList.add('hidden'); readmeContent.textContent = '';
            slideshowMessage.textContent = 'Analyzing directory...'; slideshowMessage.classList.remove('hidden');
            slideshowImage.classList.add('hidden'); slideshowImage.src = ''; currentSlideshowImages = [];
            pausePlayButton.classList.add('hidden'); nextButton.classList.add('hidden'); speedDownButton.classList.add('hidden'); speedUpButton.classList.add('hidden');

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`);
                if (!response.ok) { const errorData = await response.json(); throw new Error(`GitHub API Error: ${errorData.message || response.statusText}`); }
                const data = await response.json();
                if (!Array.isArray(data)) throw new Error('Response is not a directory listing. Is the path correct?');
                populateResultsTable(data); checkForReadme(data); await prepareSlideshow(owner, repo, path, data);
                showMessage('Directory analyzed successfully.', 'success');
            } catch (error) {
                console.error('Error fetching data:', error); showMessage(error.message, 'error'); slideshowMessage.textContent = `Error: ${error.message}`;
            } finally { setLoading(false); }
        }

        function populateResultsTable(data) {
            resultsBody.innerHTML = ''; const currentPath = pathInput.value.trim();
            if (data.length === 0 && !currentPath) { resultsContainer.classList.add('hidden'); return; }

            if (currentPath) {
                const tr = document.createElement('tr'); tr.className = 'hover:bg-gray-600 bg-gray-700 cursor-pointer transition-colors'; tr.onclick = navigateUp;
                tr.innerHTML = `<td class="px-2 py-2 whitespace-nowrap text-sm"><span class="text-blue-300 font-bold">📁 .. (Up one directory)</span></td><td class="px-2 py-2 whitespace-nowrap text-sm text-gray-300">dir</td><td class="px-2 py-2 whitespace-nowrap text-sm text-gray-300">---</td>`;
                resultsBody.appendChild(tr);
            }
            
            data.forEach(item => {
                const tr = document.createElement('tr'); tr.className = 'hover:bg-gray-700 transition-colors';
                const nameTd = document.createElement('td'); nameTd.className = 'px-2 py-2 whitespace-nowrap text-sm text-white flex items-center space-x-2';
                
                if (item.type === 'dir') {
                    tr.classList.add('cursor-pointer'); tr.onclick = () => navigateToPath(item.path); nameTd.innerHTML = `<span>📁 ${item.name}</span>`;
                } else {
                    nameTd.innerHTML = `<span class="text-gray-400">📄</span> <span>${item.name}</span>`;
                    const isImage = imageExtensions.some(ext => item.name.toLowerCase().endsWith(ext));
                    if (isImage && item.download_url) { tr.classList.add('cursor-pointer'); tr.onclick = () => displaySpecificImage(item.download_url); }
                }
                
                const typeTd = document.createElement('td'); typeTd.textContent = item.type; typeTd.className = 'px-2 py-2 whitespace-nowrap text-sm text-gray-300';
                const sizeTd = document.createElement('td'); sizeTd.textContent = item.type === 'file' ? formatBytes(item.size) : '---'; sizeTd.className = 'px-2 py-2 whitespace-nowrap text-sm text-gray-300';
                
                tr.appendChild(nameTd); tr.appendChild(typeTd); tr.appendChild(sizeTd); resultsBody.appendChild(tr);
            });
            resultsContainer.classList.remove('hidden');
        }

        function displaySpecificImage(imageUrl) {
            dropdownMenu.classList.add('hidden');
            if (slideshowTimer) { clearTimeout(slideshowTimer); slideshowTimer = null; }
            isPaused = true; pausePlayButton.textContent = '▶';
            pausePlayButton.classList.remove('hidden'); nextButton.classList.remove('hidden'); speedDownButton.classList.remove('hidden'); speedUpButton.classList.remove('hidden');
            slideshowMessage.classList.add('hidden'); slideshowImage.classList.remove('hidden');
            slideshowImage.onload = () => { slideshowImage.classList.remove('opacity-0'); slideshowImage.onload = null; };
            slideshowImage.src = imageUrl;
        }

        function checkForReadme(data) {
            const readmeFile = data.find(item => item.type === 'file' && item.name.toLowerCase() === 'readme.md');
            if (readmeFile && readmeFile.download_url) {
                readmeContainer.classList.remove('hidden'); readmeContent.textContent = 'Loading README...';
                fetch(readmeFile.download_url).then(response => { if (!response.ok) throw new Error('Network response was not ok'); return response.text(); })
                    .then(text => { readmeContent.textContent = text; }).catch(error => { readmeContent.textContent = 'Failed to load README content.'; console.error(error); });
            }
        }

        async function prepareSlideshow(owner, repo, currentPath, initialData) {
            slideshowMessage.textContent = 'Searching for images recursively...'; slideshowMessage.classList.remove('hidden'); slideshowImage.classList.add('hidden');
            let allImages = []; const searchId = Date.now(); slideshowContainer.dataset.searchId = searchId;

            async function fetchSubDirectories(dataArray) {
                if (slideshowContainer.dataset.searchId != searchId) return;
                dataArray.forEach(item => { if (item.type === 'file' && imageExtensions.some(ext => item.name.toLowerCase().endsWith(ext)) && item.download_url) allImages.push(item.download_url); });
                const subdirs = dataArray.filter(item => item.type === 'dir');
                await Promise.all(subdirs.map(async (dir) => {
                    if (slideshowContainer.dataset.searchId != searchId) return;
                    try {
                        const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${dir.path}`);
                        if (response.ok) { const subData = await response.json(); if (Array.isArray(subData)) await fetchSubDirectories(subData); }
                    } catch (error) { console.warn(`Failed to recursively fetch contents of ${dir.path}`, error); }
                }));
            }
            await fetchSubDirectories(initialData);
            if (slideshowContainer.dataset.searchId != searchId) return;
            currentSlideshowImages = allImages;
            if (currentSlideshowImages.length > 0) { startSlideshow(); } else { slideshowMessage.textContent = 'No displayable images found in this directory or its subdirectories.'; slideshowMessage.classList.remove('hidden'); slideshowImage.classList.add('hidden'); }
        }

        function generateShuffledIndices() {
            let indices = Array.from({length: currentSlideshowImages.length}, (_, i) => i); let openingIndex = -1;
            if (defaultOpeningImage) { openingIndex = currentSlideshowImages.findIndex(url => { const filename = decodeURIComponent(url.split('/').pop().split('?')[0]); return filename === defaultOpeningImage; }); }
            if (openingIndex !== -1) { indices.splice(indices.indexOf(openingIndex), 1); shuffleArray(indices); indices.unshift(openingIndex); } else { shuffleArray(indices); }
            return indices;
        }

        function startSlideshow() {
            stopSlideshow(); slideshowMessage.classList.add('hidden'); slideshowImage.classList.remove('hidden');
            isPaused = false; pausePlayButton.textContent = '⏸'; pausePlayButton.classList.remove('hidden'); nextButton.classList.remove('hidden'); speedDownButton.classList.remove('hidden'); speedUpButton.classList.remove('hidden');
            shuffledIndices = generateShuffledIndices(); currentSlideIndex = 0; showNextSlide();
        }

        function showNextSlide() {
            if (currentSlideshowImages.length === 0) { stopSlideshow(); return; }
            if (currentSlideIndex >= shuffledIndices.length) { shuffledIndices = generateShuffledIndices(); currentSlideIndex = 0; }
            const imageUrl = currentSlideshowImages[shuffledIndices[currentSlideIndex]];
            slideshowImage.onload = () => { slideshowImage.classList.remove('opacity-0'); if (!isPaused) { slideshowTimer = setTimeout(() => { slideshowImage.classList.add('opacity-0'); setTimeout(showNextSlide, 200); }, slideshowDelay); } };
            slideshowImage.onerror = () => { console.warn(`Failed to load image: ${imageUrl}`); currentSlideIndex++; showNextSlide(); };
            slideshowImage.src = imageUrl; currentSlideIndex++;
        }

        function stopSlideshow() {
            if (slideshowTimer) clearTimeout(slideshowTimer);
            slideshowTimer = null; slideshowImage.onload = null; slideshowImage.onerror = null;
            pausePlayButton.classList.add('hidden'); nextButton.classList.add('hidden'); speedDownButton.classList.add('hidden'); speedUpButton.classList.add('hidden');
        }

        function shuffleArray(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } }

        function showMessage(message, type) {
            messageArea.textContent = message; messageArea.className = 'mt-4 text-center text-sm';
            if (type === 'error') messageArea.classList.add('text-red-400'); else if (type === 'success') messageArea.classList.add('text-green-400'); else messageArea.classList.add('text-gray-400');
        }

        function setLoading(isLoading) {
            submitButton.disabled = isLoading;
            if (isLoading) { submitButton.textContent = 'Analyzing...'; submitButton.classList.add('opacity-50', 'cursor-not-allowed'); }
            else { submitButton.textContent = 'Analyze Directory'; submitButton.classList.remove('opacity-50', 'cursor-not-allowed'); }
        }

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024, dm = decimals < 0 ? 0 : decimals, sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'], i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        init();
    });
</script>

</body>
</html>
