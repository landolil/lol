<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tardigradia Holding Company - Responsive Frame Grid</title>
<style>
  /* * Resetting default browser margins and enforcing the Box Model.
   * Locking the application height to 100% of the Viewport Height (100vh).
   */
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    padding: 1vw; /* Responsive padding to prevent edge collision */
    height: 100vh;
    background-color: #f4f4f4;
    font-family: system-ui, -apple-system, sans-serif;
  }

  /* * Initialization of the CSS Grid Formatting Context.
   * Gap provides mathematically distinct spacing between nodes without breaking width.
   */
 .grid-container {
    display: grid;
    gap: 15px;
    height: 100%;
    width: 100%;
  }

  /* * Security constraints: The contents will render blank due to X-Frame-Options.
   * The requested "600nm blue" is digitally mapped to #004DFF. 
   */
  iframe {
    width: 100%;
    height: 100%;
    border: 4px solid #004DFF; 
    border-radius: 8px;
    background-color: #ffffff; /* Explicit background to visualize the blocked frame */
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    display: block; /* Removes baseline gap below iframe */
  }

  /* * The title container utilizes Flexbox for internal micro-centering.
   * Border padding is implemented using both padding and border properties.
   */
 .title-container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 15px; /* Internal padding resolving the Box Model requirement */
    border: 4px solid #004DFF;
    border-radius: 8px;
    background-color: #ffffff;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  /* * --------------------------------------------------------
   * PORTRAIT ORIENTATION ALGORITHM
   * --------------------------------------------------------
   */
  @media (orientation: portrait) {
   .grid-container {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr auto 1fr 1fr;
    }
   .title-container {
      grid-column: 1 / -1; 
      grid-row: 3; 
    }
  }

  /* * --------------------------------------------------------
   * LANDSCAPE ORIENTATION ALGORITHM
   * --------------------------------------------------------
   */
  @media (orientation: landscape) {
   .grid-container {
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: 1fr auto 1fr;
    }
   .title-container {
      grid-column: 1 / -1; 
      grid-row: 2; 
    }
  }

  /* * --------------------------------------------------------
   * OVERLAY LINK STYLES
   * --------------------------------------------------------
   */
  .iframe-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .edge-overlay-link {
    position: absolute;
    left: 50%;
    /* Bright outline, highly contrasting colors */
    background-color: #004DFF;
    color: #ffffff;
    border: 3px solid #ffffff;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 800;
    text-decoration: none;
    letter-spacing: 0.5px;
    white-space: nowrap;
    z-index: 10;
    transition: transform 0.2s ease, background-color 0.2s ease;
  }

  .edge-overlay-link:hover {
    background-color: #0033cc;
    transform: scale(1.05);
  }

  /* Exactly centers the element on the BOTTOM border */
  .overlay-bottom {
    bottom: 0;
    transform: translate(-50%, 50%);
  }
  .overlay-bottom:hover {
    transform: translate(-50%, 50%) scale(1.05);
  }

  /* Exactly centers the element on the TOP border */
  .overlay-top {
    top: 0;
    transform: translate(-50%, -50%);
  }
  .overlay-top:hover {
    transform: translate(-50%, -50%) scale(1.05);
  }
</style>
</head>
<body>

  <div class="grid-container">
    <iframe src="https://www.carrpod.net" title="External Domain Frame 1"></iframe>
    <iframe src="https://fun.carrpod.net" title="External Domain Frame 2"></iframe>
    <iframe src="https://oober.carrpod.net" title="External Domain Frame 3"></iframe>
    <iframe src="https://www.antikytherian.com" title="External Domain Frame 4"></iframe>

    <div class="title-container">
      <svg viewBox="0 0 1000 80" width="95%" height="100%" preserveAspectRatio="xMidYMid meet">
        <text 
          x="50%" 
          y="50%" 
          dominant-baseline="middle" 
          text-anchor="middle" 
          fill="#004DFF" 
          font-size="64" 
          font-weight="900"
          letter-spacing="2.3"
        >
          Tardigradia Holding Company
        </text>
      </svg>
    </div>

    <iframe src="https://www.primebook.one" title="External Domain Frame 5"></iframe>
    <iframe src="https://www.enupfs.com" title="External Domain Frame 6"></iframe>
    <iframe src="https://www.google.com/webhp?igu=1" title="External Domain Frame 7"></iframe>
    <iframe src="https://www.google.com/webhp?igu=1" title="External Domain Frame 8"></iframe>
  </div>

  <script>
    // Execute after the DOM is fully loaded
    document.addEventListener('DOMContentLoaded', () => {
      // Select all iframes inside the grid container
      const iframes = document.querySelectorAll('.grid-container iframe');
      
      iframes.forEach((iframe, index) => {
        // 1. Create a positioning wrapper for each iframe
        const wrapper = document.createElement('div');
        wrapper.className = 'iframe-wrapper';
        
        // 2. Wrap the iframe (inserts wrapper before iframe, then moves iframe inside wrapper)
        iframe.parentNode.insertBefore(wrapper, iframe);
        wrapper.appendChild(iframe);

        // 3. Extract the clean website name from the src URL
        let urlObj;
        try {
          urlObj = new URL(iframe.src);
        } catch (e) {
          return; // Skip if there's an invalid URL
        }
        // Remove 'www.' for a cleaner display name
        const websiteName = urlObj.hostname.replace(/^www\./, '');

        // 4. Create the overlay link element
        const link = document.createElement('a');
        link.href = iframe.src;
        link.target = '_blank'; // Opens in a new tab
        link.textContent = websiteName;
        link.className = 'edge-overlay-link';

        // 5. Apply bottom/top positioning based on the index
        // Frames 0-3 (the first 4) go on the bottom line. 
        // Frames 4-7 (the last 4) go on the top line.
        if (index < 4) {
          link.classList.add('overlay-bottom');
        } else {
          link.classList.add('overlay-top');
        }

        // 6. Add the link to the wrapper
        wrapper.appendChild(link);
      });
    });
  </script>
</body>
</html>
